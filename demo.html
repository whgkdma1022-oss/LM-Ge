<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>피지컬 AI의 시대 - The Era of Physical AI (Preview)</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Scripts: React, Babel, Tailwind, Framer Motion -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@11.0.0/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#0A0F1D',
                        surface: '#121826',
                        'surface-lighter': '#1E2538',
                        accent: {
                            DEFAULT: '#00E5FF',
                            hover: '#00B8CC',
                        },
                        offwhite: '#E2E8F0',
                        muted: '#94A3B8',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/css">
        @layer base {
            body { background-color: #0A0F1D; color: #E2E8F0; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        }
        .text-gradient { background: linear-gradient(to right, #fff, #fff, #00E5FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-nav { background: rgba(10, 15, 29, 0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .glow-spot { position: absolute; width: 400px; height: 400px; background: radial-gradient(circle, rgba(0, 229, 255, 0.1) 0%, transparent 70%); pointer-events: none; z-index: -1; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0A0F1D; }
        ::-webkit-scrollbar-thumb { background: #1E2538; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // Icons Helper
        const Icon = ({ name, size = 24, className = "" }) => {
            const [iconSvg, setIconSvg] = useState("");
            useEffect(() => {
                if (window.lucide) {
                    const icon = window.lucide.icons[name];
                    if (icon) {
                        const svg = icon.toSvg({ size, class: className });
                        setIconSvg(svg);
                    }
                }
            }, [name, size, className]);
            return <span dangerouslySetInnerHTML={{ __html: iconSvg }} />;
        };

        const Navbar = () => {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed top-0 w-full z-50 transition-all duration-500 ${scrolled ? 'glass-nav py-4' : 'bg-transparent py-6'}`}>
                    <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-accent rounded-lg flex items-center justify-center font-bold text-black text-xl">P</div>
                            <span className="text-xl font-display font-bold tracking-tight text-white uppercase">
                                Physical <span className="text-accent">AI</span>
                            </span>
                        </div>
                        <div className="hidden md:flex gap-8">
                            {['홈', '핵심 기술', '디지털 vs 피지컬', '산업별 혁신', '글로벌 트렌드'].map((item) => (
                                <a key={item} href="#" className="text-sm font-medium text-muted hover:text-accent transition-colors">{item}</a>
                            ))}
                        </div>
                        <button className="bg-accent/10 border border-accent/20 text-accent px-5 py-2 rounded-full text-sm font-semibold hover:bg-accent hover:text-black transition-all">백서 받기</button>
                    </div>
                </nav>
            );
        };

        const Hero = () => (
            <section className="relative h-screen flex items-center justify-center overflow-hidden pt-20">
                <div className="glow-spot top-[10%] left-[20%]" />
                <div className="glow-spot bottom-[10%] right-[20%]" />
                <div className="max-w-7xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-2 items-center z-10 w-full">
                    <motion.div initial={{ opacity: 0, x: -50 }} animate={{ opacity: 1, x: 0 }} transition={{ duration: 0.8 }}>
                        <div className="flex items-center gap-2 mb-6">
                            <div className="h-[1px] w-8 bg-accent" />
                            <span className="text-accent text-sm font-bold tracking-[0.2em] uppercase">Beyond Digital Intelligence</span>
                        </div>
                        <h1 className="text-5xl md:text-7xl font-display font-extrabold mb-6 leading-tight text-white">
                            화면 밖으로 나온 <br />
                            <span className="text-gradient">인공지능</span>의 시대
                        </h1>
                        <p className="text-lg text-muted mb-10 max-w-lg leading-relaxed">
                            디지털 지능이 물리적 실체와 결합하여 현실 세계를 움직입니다. 
                            피지컬 AI는 단순한 알고리즘을 넘어 동작과 힘을 제어하는 진화된 미래입니다.
                        </p>
                        <div className="flex flex-wrap gap-4">
                            <button className="bg-accent text-black font-bold px-8 py-4 rounded-xl flex items-center gap-2 hover:bg-white transition-all">
                                폐쇄 루프 시스템 탐색하기
                            </button>
                        </div>
                    </motion.div>
                    <motion.div initial={{ opacity: 0, scale: 0.8 }} animate={{ opacity: 1, scale: 1 }} transition={{ duration: 1 }} className="relative hidden lg:block">
                        <div className="relative z-10 w-full h-[500px] flex items-center justify-center">
                            <div className="absolute inset-0 bg-gradient-to-t from-background to-transparent z-10" />
                            <img src="https://images.unsplash.com/photo-1546776230-bb8629385881?auto=format&fit=crop&q=80&w=1000" className="w-full h-full object-cover rounded-3xl opacity-40 mix-blend-screen" alt="Robot" />
                            <motion.div animate={{ rotate: 360 }} transition={{ duration: 20, repeat: Infinity, ease: "linear" }} className="absolute -inset-10 border border-accent/20 rounded-full border-dashed" />
                        </div>
                    </motion.div>
                </div>
            </section>
        );

        const TechSection = () => (
            <div className="py-24 bg-surface/30">
                <div className="max-w-7xl mx-auto px-6">
                    <div className="text-center mb-16">
                        <h2 className="text-4xl font-display font-bold text-white mb-4">끊임없이 순환하는 지능의 루프</h2>
                        <p className="text-muted max-w-2xl mx-auto">현실 세계의 피드백을 즉각적으로 인지하고 수정하는 폐쇄 루프 시스템입니다.</p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        {[
                            { title: '지각 (Perception)', desc: 'LiDAR와 비전을 통한 실시간 데이터 수집' },
                            { title: '인지·판단 (Cognition)', desc: '엣지 AI 기반 로보틱스 파운데이션 모델 연산' },
                            { title: '작동 (Actuation)', desc: '정밀 액추에이터를 통한 물리적 토크 제어' }
                        ].map((item, i) => (
                            <motion.div key={i} whileHover={{ y: -10 }} className="p-8 bg-surface-lighter rounded-2xl border border-white/5">
                                <h3 className="text-xl font-bold text-white mb-4">{item.title}</h3>
                                <p className="text-sm text-muted">{item.desc}</p>
                            </motion.div>
                        ))}
                    </div>
                </div>
            </div>
        );

        const App = () => (
            <div className="bg-background min-h-screen font-sans">
                <Navbar />
                <Hero />
                <TechSection />
                <div className="py-24 max-w-7xl mx-auto px-6 text-center">
                    <h2 className="text-3xl font-bold text-white mb-8">산업별 혁신 & 상세 분석</h2>
                    <p className="text-muted mb-12">전체 대규모 코드는 src 폴더의 컴포넌트 파일에 구현되어 있습니다.</p>
                    <div className="p-12 border border-accent/20 rounded-3xl bg-accent/5">
                        <span className="text-accent font-bold">PREVIEW MODE</span>
                        <p className="mt-4 text-offwhite uppercase tracking-widest text-sm">Standalone HTML version for immediate review</p>
                    </div>
                </div>
                <footer className="py-12 border-t border-white/5 text-center text-xs text-muted/50">
                    © 2026 Physical AI Strategy Group. All rights reserved.
                </footer>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
